<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Globe — Global Crypto Payments</title>
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    #globe { display: block; width: 100vw; height: 100vh; touch-action: none; }
    .caption {
      position: fixed;
      left: 0; right: 0; bottom: 28px;
      text-align: center;
      color: rgba(20, 22, 28, 0.5);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
    }
    .loading {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      color: rgba(20, 22, 28, 0.4);
      font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
      transition: opacity 0.6s ease;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="globe"></canvas>
  <div class="caption">Global Crypto Payments</div>
  <div class="loading" id="loading">Building the globe…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "d3-geo": "https://cdn.jsdelivr.net/npm/d3-geo@3/+esm",
      "topojson-client": "https://cdn.jsdelivr.net/npm/topojson-client@3/+esm"
    }
  }
  </script>
  <script type="module" src="./globe.js"></script>
</body>
</html>
